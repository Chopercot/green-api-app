<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEN-API Client</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="input-section">
            <div class="field-group">
                <input type="text" id="idInstance" placeholder="idInstance">
                <input type="text" id="apiTokenInstance" placeholder="ApiTokenInstance">
            </div>

            <div class="button-group">
                <button onclick="getSettings()">getSettings</button>
                <button onclick="getStateInstance()">getStateInstance</button>
            </div>

            <div class="field-group">
                <input type="text" id="chatIdMessage" placeholder="79991234567">
                <textarea id="messageText" placeholder="Введите сообщение"></textarea>
                <button onclick="sendMessage()">sendMessage</button>
            </div>

            <div class="field-group">
                <input type="text" id="chatIdFile" placeholder="79991234567">
                <input type="text" id="fileUrl" placeholder="https://example.com/file.jpg">
                <button onclick="sendFileByUrl()">sendFileByUrl</button>
            </div>
        </div>

        <div class="output-section">
            <label>Ответ:</label>
            <textarea id="responseOutput" readonly></textarea>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
